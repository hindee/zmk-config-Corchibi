parse_config:
  preprocess: true
  skip_binding_parsing: false
  raw_binding_map: {}
  sticky_label: sticky
  toggle_label: toggle
  tap_toggle_label: tap-toggle
  trans_legend:
    t: ▽
    type: trans
  layer_legend_map: {}
  mark_alternate_layer_activators: false
  modifier_fn_map:
    left_ctrl: Ctl
    right_ctrl: Ctl
    left_shift: Sft
    right_shift: Sft
    left_alt: Alt
    right_alt: AltGr
    left_gui: Gui
    right_gui: Gui
    keycode_combiner: '{mods}+{key}'
    mod_combiner: '{mod_1}+{mod_2}'
    special_combinations:
      left_ctrl+left_alt+left_gui+left_shift: Hyper
      left_ctrl+left_alt+left_shift: Meh
  zmk_remove_keycode_prefix: []
  zmk_keycode_map:
    EXCLAMATION: '!'
    EXCL: '!'
    AT_SIGN: '@'
    AT: '@'
    HASH: '#'
    POUND: '#'
    DOLLAR: $
    DLLR: $
    PERCENT: '%'
    PRCNT: '%'
    CARET: ^
    AMPERSAND: '&'
    AMPS: '&'
    ASTERISK: '*'
    ASTRK: '*'
    STAR: '*'
    LEFT_PARENTHESIS: (
    LPAR: (
    RIGHT_PARENTHESIS: )
    RPAR: )
    EQUAL: '='
    PLUS: +
    MINUS: '-'
    UNDERSCORE: _
    UNDER: _
    SLASH: /
    FSLH: /
    QUESTION: '?'
    QMARK: '?'
    BACKSLASH: \
    BSLH: \
    PIPE: '|'
    NON_US_BACKSLASH: \
    PIPE2: '|'
    NON_US_BSLH: '|'
    SEMICOLON: ;
    SEMI: ;
    COLON: ':'
    SINGLE_QUOTE: ''''
    SQT: ''''
    APOSTROPHE: ''''
    APOS: ''''
    DOUBLE_QUOTES: '"'
    DQT: '"'
    COMMA: ','
    LESS_THAN: <
    LT: <
    PERIOD: .
    DOT: .
    GREATER_THAN: '>'
    GT: '>'
    LEFT_BRACKET: '['
    LBKT: '['
    LEFT_BRACE: '{'
    LBRC: '{'
    RIGHT_BRACKET: ']'
    RBKT: ']'
    RIGHT_BRACE: '}'
    RBRC: '}'
    GRAVE: '`'
    TILDE: '~'
    NON_US_HASH: '#'
    NUHS: '#'
    TILDE2: '~'
    UP: '▲'
    DOWN: '▼'
    LEFT: '◀'
    RIGHT: '▶'
    TAB: '↹'
    RGUI: '⌘'
    LGUI: '⌘'
    BSPC: '⌫'
    # RET: '⏎'
    RET: '↵'
    LSHFT: '⇧'
    RSHFT: '⇧'
    ESC: '⎋'
    LALT: '⌥'
    RALT: '⌥'
    LCTRL: '^'
    RCTRL: '^'
    SPACE: '␣'
    OTHER1: '◇'
    OTHER2: '○'
    OTHER3: '▢'
    OTHER4: '🛆'
    OTHER5: '×'
    

  zmk_combos: {}
  zmk_preamble: '#define KEYMAP_DRAWER'
  zmk_additional_includes: []
  # ----- Raw bindings for encoders/trackball -----
  raw_binding_map:
    '&TB1_mouse':  { tap: '$$trackball_19mm$$', hold: 'Mouse' }
    '&TB1_scroll':  { tap: '$$trackball_19mm$$', hold: 'Scroll' }
    '&TB2_mouse':  { tap: '$$trackball_14mm$$', hold: 'Mouse' }
    '&TB2_scroll':  { tap: '$$trackball_14mm$$', hold: 'Scroll' }
    '&RE_scroll_ud':  { tap: '$$rotaryencoder$$', hold: '↑↓' }
    '&RE_scroll_lr':  { tap: '$$rotaryencoder$$', hold: '←→' }
    