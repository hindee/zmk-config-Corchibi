draw_config:
  n_columns: 2
  draw_key_sides: true
  append_colon_to_layer_header: true
  small_pad: 4.0
  key_w: 60.0
  key_h: 56.0
  split_gap: 30.0
  combo_w: 28.0
  combo_h: 26.0
  key_rx: 6.0
  key_ry: 6.0
  dark_mode: auto
  n_columns: 1
  separate_combo_diagrams: false
  combo_diagrams_scale: 2
  inner_pad_w: 1.0
  inner_pad_h: 1.0
  outer_pad_w: 30.0
  outer_pad_h: 56.0
  line_spacing: 1.2
  arc_radius: 6.0
  append_colon_to_layer_header: true
  small_pad: 2.0
  legend_rel_x: 0.0
  legend_rel_y: 0.0
  draw_key_sides: true
  key_side_pars:
    rel_x: 0
    rel_y: 0
    rel_w: 12
    rel_h: 12
    rx: 8
    ry: 8
  svg_extra_style: |
    svg.keymap {
      background-color: #434343 !important;
      font-family: Ubuntu Mono, Inconsolata, Consolas, Liberation Mono, Menlo, monospace;
      font-size: 14px;
      font-weight: bold;
      text-rendering: optimizeLegibility;
    }
    .key rect {
      # fill: #D3FF89 !important;      /* キーの色 */
      # stroke: #B3DF69 !important;    /* 枠線の色 */
      fill: #333333 !important;      /* キーの色 */
      stroke: #000000 !important;    /* 枠線の色 */
      stroke-width: 2px;
    }
    .key text {
      fill: #FFFFFF;
    }
    text { fill: #000000; }
    .key:has(use[href^="#trackball_"]) text.hold {
      fill: #FFFFFF !important;
      font-size: 12px !important;
      font-weight: bold !important;
      display: block !important;
      transform: translate(0px, -10px) !important;
    }
    .key:has(use[href="#rotaryencoder"]) text.hold {
      fill: #FFFFFF !important;
      font-size: 12px !important;
      font-weight: bold !important;
      display: block !important;
      transform: translate(0px, -20px) !important;
    }

  footer_text: Created with <a href="https://github.com/caksoylar/keymap-drawer">keymap-drawer</a>
  shrink_wide_legends: 7
  style_layer_activators: true
  glyph_tap_size: 58
  glyph_hold_size: 12
  glyph_shifted_size: 10
  glyphs:
    trackball_14mm: |
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
        <defs>
          <radialGradient id="trackball-gradient" cx="50%" cy="50%" r="50%">
            <!-- <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#dddddd"/>-->
            <stop offset="0%" stop-color="#444444"/>
            <stop offset="100%" stop-color="#222222"/>
          </radialGradient>
        </defs>
        <rect x="2" y="2" width="92" height="92" fill="#ffffff" stroke="#000000"/>
        <ellipse cx="48" cy="48" rx="36" ry="36" fill="url(#trackball-gradient)" stroke="#000000"/>
      </svg>
    trackball_19mm: |
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
        <defs>
          <radialGradient id="trackball-gradient" cx="50%" cy="50%" r="50%">
            <!-- <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#dddddd"/> -->
            <stop offset="0%" stop-color="#444444"/>
            <stop offset="100%" stop-color="#222222"/>
          </radialGradient>
        </defs>
        <rect x="2" y="2" width="92" height="92" fill="#ffffff" stroke="#000000"/>
        <ellipse cx="48" cy="48" rx="46" ry="46" fill="url(#trackball-gradient)" stroke="#000000" stroke-width="3.5" />
      </svg>
    rotaryencoder: |
      <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="39 0 102 101">
        <path 
          class="glyph"
          style="fill: #333333 !important; fill-opacity: 1 !important;"
          fill="#FFFFFF" 
          stroke="#000000" 
          stroke-width="3.5" 
          stroke-linejoin="round"
